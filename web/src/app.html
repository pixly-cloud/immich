<!doctype html>
<html class="dark">
  <head>
    <!-- (used for SSR) -->
    <!-- metadata:tags -->

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96.png" />
    <link rel="icon" type="image/png" sizes="144x144" href="/favicon-144.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-icon-180.png" />
    <link rel="preload" as="font" type="font/ttf" href="%app.font%" crossorigin="anonymous" />
    <link rel="preload" as="font" type="font/ttf" href="%app.monofont%" crossorigin="anonymous" />

    <script>
      try {
        const preference = JSON.parse(localStorage.getItem('immich-ui-theme'));
        const prefersDark = globalThis.matchMedia('(prefers-color-scheme: dark)').matches;
        if (preference === 'light' || (preference !== 'dark' && !prefersDark)) {
          document.documentElement.classList.remove('dark');
          document.documentElement.classList.add('light');
        }
      } catch {
        // noop
      }
    </script>

    %sveltekit.head%

    <style>
      /* prevent FOUC */
      html {
        height: 100%;
        width: 100%;
      }

      html.dark {
        background-color: black;
      }

      html.light {
        background-color: white;
      }

      body,
      html {
        margin: 0;
        padding: 0;
      }

      @keyframes delayedVisibility {
        to {
          visibility: visible;
        }
      }

      @keyframes loadspin {
        100% {
          transform: rotate(360deg);
        }
      }

      #stencil {
        --stencil-width: 150px;
        display: flex;
        width: var(--stencil-width);
        margin-left: auto;
        margin-right: auto;
        margin-top: calc(50vh - var(--stencil-width) / 2);
        margin-bottom: 100vh;
        place-items: center;
        justify-content: center;
        overflow: hidden;
        visibility: hidden;
        animation:
          0s linear 0.3s forwards delayedVisibility,
          loadspin 8s linear infinite;
      }
    </style>
    <link rel="stylesheet" href="/custom.css" />
  </head>

  <noscript style="position: absolute; top: 0px; z-index: 1000; color: black; background-color: white">
    To use Pixly, you must enable JavaScript or use a JavaScript compatible browser.
  </noscript>

  <body class="bg-light text-dark">
    <div id="stencil">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 252.990767 218.180013" style="fill:currentColor">
        <g transform="translate(-47.000000,225.680013) scale(0.100000,-0.100000)" fill="currentColor" stroke="none">
          <path d="M773 2250 c-141 -34 -260 -160 -292 -308 -7 -36 -11 -281 -11 -785 0 -630 2 -741 16 -792 30 -118 100 -202 212 -257 l67 -33 600 0 600 0 60 24 c83 33 184 134 213 213 39 104 42 162 42 854 0 580 -2 683 -16 750 -31 149 -98 240 -222 301 l-76 38 -580 2 c-320 1 -595 -2 -613 -7z m1222 -90 c70 -34 139 -108 164 -175 20 -54 21 -72 21 -717 l0 -661 -52 49 c-29 26 -130 121 -225 211 -95 90 -177 163 -182 163 -5 0 -114 -102 -243 -227 -259 -252 -479 -455 -486 -448 -3 2 43 65 102 140 l106 135 -41 45 c-23 25 -47 44 -53 42 -6 -2 -33 16 -61 40 -27 23 -54 43 -60 43 -5 0 -102 -95 -215 -212 l-205 -211 -9 37 c-7 33 -5 41 16 64 14 15 82 92 153 172 71 80 157 176 192 214 l64 69 45 -44 c25 -24 77 -81 116 -126 40 -46 77 -83 84 -83 7 0 105 109 217 243 113 133 221 260 240 282 l36 40 194 -194 c107 -106 196 -189 199 -185 2 5 6 44 7 88 l3 78 -199 199 c-124 125 -204 199 -215 197 -9 -2 -121 -124 -248 -271 l-233 -269 -116 116 c-64 64 -121 116 -127 116 -6 0 -62 -59 -125 -132 -223 -258 -272 -313 -291 -333 -18 -20 -19 -10 -16 635 3 647 3 656 25 702 25 55 94 133 137 155 79 41 90 42 671 40 l560 -2 50 -25z"/>
        </g>
      </svg>
    </div>
    <div>%sveltekit.body%</div>
  </body>
</html>
